<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasbih Counter</title>

<style>
:root { --primary: #1D9E75; }

body {
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  margin: 0;
}

/* REMOVE BLUE TAP HIGHLIGHT */
* {
  -webkit-tap-highlight-color: transparent;
}

button {
  outline: none;
  border: none;
}

button:focus {
  outline: none;
}

/* MAIN WRAP */
.tasbih-wrap {
  max-width: 420px;
  margin: auto;
  padding: 1rem;
}

/* Top */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.settings-btn {
  padding: 6px 10px;
  background: #eee;
  border-radius: 6px;
}

/* Settings */
.settings-panel {
  display: none;
  background: white;
  padding: 1rem;
  border-radius: 10px;
  margin-top: 10px;
}
.settings-panel.open { display: block; }

.settings-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.limit-input { width: 70px; }

/* Dhikr */
.dhikr-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.dhikr-btn {
  flex: 1 1 48%;
  padding: 8px;
}
.active {
  background: var(--primary);
  color: white;
}

/* Counter */
.counter-card {
  text-align: center;
  margin-top: 15px;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.count-num { font-size: 40px; }

/* BIG BUTTON */
.tap-btn {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  font-size: 52px;
  margin-top: 10px;
  cursor: pointer;

  transition: transform 0.1s;

  /* EXTRA FIX */
  user-select: none;
  -webkit-user-select: none;
}
.tap-btn:active {
  transform: scale(0.92);
}

/* Stats */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 6px;
  margin-top: 10px;
}
.stat-card {
  background: white;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
}

/* Actions */
.action-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 10px;
}
.action-btn { padding: 10px; }
</style>
</head>

<body>

<div class="tasbih-wrap">

  <div class="top-bar">
    <h3>Tasbih Digital Counter</h3>
    <button class="settings-btn" id="settingsToggle">Settings</button>
  </div>

  <!-- SETTINGS -->
  <div class="settings-panel" id="settingsPanel">

    <div class="settings-row">
      <span>Limit</span>
      <input type="number" id="limitInput" class="limit-input" value="33">
    </div>

    <div class="settings-row">
      <span>Vibrate on complete</span>
      <input type="checkbox" id="vibrateToggle" checked>
    </div>

    <div class="settings-row">
      <span>Auto reset</span>
      <input type="checkbox" id="autoResetToggle">
    </div>

    <div class="settings-row">
      <span>Haptic on tap</span>
      <input type="checkbox" id="hapticToggle" checked>
    </div>

  </div>

  <!-- Dhikr -->
  <div class="dhikr-selector">
    <button class="dhikr-btn active" data-limit="33">SubhanAllah</button>
    <button class="dhikr-btn" data-limit="33">Alhamdulillah</button>
    <button class="dhikr-btn" data-limit="34">Allahu Akbar</button>
    <button class="dhikr-btn" data-limit="100">Istighfar</button>
  </div>

  <!-- Counter -->
  <div class="counter-card">
    <div class="count-num" id="countNum">0</div>
    <div id="countLimit">of 33</div>
    <button class="tap-btn" id="tapBtn">+</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">Rounds<br><span id="statRounds">0</span></div>
    <div class="stat-card">Total<br><span id="statTotal">0</span></div>
    <div class="stat-card">Remaining<br><span id="statRemain">33</span></div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="action-btn" id="undoBtn">Undo</button>
    <button class="action-btn" id="resetBtn">Reset</button>
  </div>

</div>

<script>
let count = 0, total = 0, rounds = 0, limit = 33;

const tapBtn = document.getElementById('tapBtn');
const hapticToggle = document.getElementById('hapticToggle');
const vibrateToggle = document.getElementById('vibrateToggle');
const autoResetToggle = document.getElementById('autoResetToggle');

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function updateUI() {
  countNum.textContent = count;
  countLimit.textContent = "of " + limit;
  statRounds.textContent = rounds;
  statTotal.textContent = total;
  statRemain.textContent = limit - count;
}

function tap() {
  if (count >= limit) return;

  count++;
  total++;

  if (hapticToggle.checked) vibrate(10);

  if (count === limit) {
    rounds++;

    if (vibrateToggle.checked) vibrate([120, 60, 120]);

    if (autoResetToggle.checked) {
      setTimeout(() => { count = 0; updateUI(); }, 1000);
    }
  }

  updateUI();
}

tapBtn.addEventListener('click', tap);

undoBtn.onclick = () => {
  if (count > 0) { count--; total--; }
  updateUI();
};

resetBtn.onclick = () => {
  count = 0; total = 0; rounds = 0;
  updateUI();
};

settingsToggle.onclick = () => {
  settingsPanel.classList.toggle('open');
};

limitInput.onchange = () => {
  limit = parseInt(limitInput.value);
  count = 0;
  updateUI();
};

document.querySelectorAll('.dhikr-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.dhikr-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    limit = parseInt(btn.dataset.limit);
    limitInput.value = limit;
    count = 0;
    updateUI();
  };
});

updateUI();
</script>

</body>
</html>
